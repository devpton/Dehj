<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jade Hotel</title>

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
      background: linear-gradient(180deg, #ffd6ec, #ffeef7);
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    /* LOGO */
    .logo {
      font-size: 48px;
      font-weight: bold;
      color: #ff4fa3;
      text-shadow: 2px 2px #fff;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    /* QUARTO DECORATIVO */
    .room {
      width: 300px;
      height: 200px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      margin-bottom: 30px;
      position: relative;
      overflow: hidden;
    }

    .floor {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 60%;
      background: repeating-linear-gradient(
        45deg,
        #ffc0e0,
        #ffc0e0 10px,
        #ffd6ec 10px,
        #ffd6ec 20px
      );
    }

    .sofa {
      position: absolute;
      bottom: 30px;
      left: 20px;
      width: 60px;
      height: 30px;
      background: #ff85c1;
      border-radius: 10px;
    }

    .plant {
      position: absolute;
      bottom: 30px;
      right: 20px;
      width: 20px;
      height: 40px;
      background: #7ed957;
      border-radius: 10px;
    }

    /* BOTÕES */
    .btn {
      width: 220px;
      padding: 15px;
      margin: 10px;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .play {
      background: #ff4fa3;
      color: white;
      box-shadow: 0 5px #d63c87;
    }

    .custom {
      background: #ffffff;
      color: #ff4fa3;
      border: 2px solid #ff4fa3;
    }

    .btn:active {
      transform: scale(0.95);
    }

    /* BRILHOS */
    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      animation: sparkleAnim 2s infinite;
    }

    @keyframes sparkleAnim {
      0% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.5); }
    }

  </style>
</head>

<body>

<div class="container">

  <div class="logo">💖 Jade Hotel</div>

  <div class="room">
    <div class="floor"></div>
    <div class="sofa"></div>
    <div class="plant"></div>

    <!-- brilhos -->
    <div class="sparkle" style="top:20px; left:50px;"></div>
    <div class="sparkle" style="top:60px; left:200px;"></div>
    <div class="sparkle" style="top:40px; left:120px;"></div>
  </div>

  <button class="btn play" onclick="startGame()">Jogar</button>
  <button class="btn custom" onclick="openCustom()">Personalizar</button>

</div>

<script>
  function startGame() {
    alert("Entrando no Jade Hotel 💖");
    // depois você liga isso com o jogo
    // window.location.href = "game.html";
  }

  function openCustom() {
    alert("Abrir personalização 👗");
  }
</script>

</body>
</html>
